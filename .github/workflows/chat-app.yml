name: Build, Push & Deploy to AKS

on:
  push:
    branches:
      - dev
      - staging
      - uat

env:
  DOCKER_BUILDKIT: 1
  ACR_NAME: chatappregsistry
  IMAGE_NAME: chat-app
  AKS_CLUSTER_NAME: ChatAppCluster
  AKS_RESOURCE_GROUP: ChatResourceGroup

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew test sonar --no-daemon \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Image tag and namespace
        run: |
          echo "IMAGE_TAG=${GITHUB_REF_NAME}-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "DEPLOY_NAMESPACE=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - run: az acr login --name $ACR_NAME

      - name: Docker build and push
        run: |
          IMG="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
          docker build -t "$IMG" .
          docker push "$IMG"

      - uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Helm upgrade
        run: |
          test -f "helm/values-${DEPLOY_NAMESPACE}.yaml"
          helm upgrade --install chat-app ./helm \
            --namespace "$DEPLOY_NAMESPACE" \
            --create-namespace \
            -f "helm/values-${DEPLOY_NAMESPACE}.yaml" \
            --set image.repository=$ACR_NAME.azurecr.io/$IMAGE_NAME \
            --set image.tag=$IMAGE_TAG \
            --wait --timeout 5m
