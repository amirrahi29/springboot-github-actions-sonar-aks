# Staging — git branch `staging` only → AKS namespace `staging` → tag `staging-<sha>` → THIS file (helm/values-staging.yaml)
# CI: push to `staging` runs .github/workflows/chat-app.yml → helm upgrade -n staging -f helm/values-staging.yaml

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

podAnnotations:
  environment: staging

service:
  type: LoadBalancer

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: app-staging.mergeai.in
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
