# branch uat → namespace uat → helm/values-uat.yaml
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

podAnnotations:
  environment: uat

service:
  type: LoadBalancer

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: app-uat.mergeai.in
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
